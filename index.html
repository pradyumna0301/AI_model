<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="login-container">
    <h2>Welcome Back</h2>
    <p>Please login to your account</p>

    <form>
      <div class="input-group">
        <input type="email" required>
        <label>Email</label>
      </div>

      <div class="input-group">
        <input type="password" required>
        <label>Password</label>
      </div>

      <button type="submit">Login</button>

      <div class="extra">
        <a href="#">Forgot password?</a>
        <span> | </span>
        <a href="#">Sign up</a>
      </div>
    </form>
  </div>
  <footer class="futuristic-footer">
    <div class="dev-container">
        <div class="dev-logo">
            <img src="logo.png" alt="Cr27 Logo" onerror="this.style.display='none'">
            <div class="logo-fallback">CR27</div>
        </div>
        
        <div class="dev-info">
            <span class="label">LEAD DEVELOPER</span>
            <h3 class="dev-name">Cr27_Pradyumna Nandanwar</h3>
            <div class="status-bar">
                <span class="pulse"></span> SYSTEM ACTIVE
            </div>
        </div>
    </div>
</footer>

</body>
</html>
